<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>簡単ボイスチェンジャー：ワンタップで声を変換</title>
    <style>
      :root {
        --bg-1: #0b0f18;
        --bg-2: #121a26;
        --bg-3: #0a0c13;
        --card: rgba(22, 30, 43, 0.84);
        --line: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --sub: rgba(255, 255, 255, 0.82);
        --muted: rgba(255, 255, 255, 0.68);
        --cyan: #18f6ff;
        --pink: #ff4dc4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        line-height: 1.75;
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2), var(--bg-3));
      }

      a {
        color: var(--cyan);
      }

      .orb {
        position: fixed;
        border-radius: 999px;
        filter: blur(58px);
        opacity: 0.24;
        pointer-events: none;
      }

      .orb.cyan {
        width: 260px;
        height: 260px;
        top: -80px;
        right: -70px;
        background: var(--cyan);
      }

      .orb.pink {
        width: 220px;
        height: 220px;
        left: -40px;
        bottom: 60px;
        background: var(--pink);
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: min(880px, calc(100% - 24px));
        margin: 20px auto 32px;
      }

      .hero {
        margin-bottom: 14px;
        padding: 22px 20px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(24, 246, 255, 0.12), rgba(255, 77, 196, 0.08));
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 34px);
        line-height: 1.3;
        letter-spacing: 0.02em;
      }

      .lead {
        margin: 10px 0 0;
        color: var(--sub);
      }

      .section {
        margin-top: 14px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      }

      p {
        margin: 0;
        color: var(--sub);
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .link-card {
        display: block;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.04);
      }

      .link-card strong {
        display: block;
        margin-bottom: 4px;
        color: var(--text);
      }

      .link-card span {
        color: var(--sub);
      }

      .footer {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="orb cyan"></div>
    <div class="orb pink"></div>

    <main class="wrap">
      <section class="hero">
        <h1>簡単ボイスチェンジャー：ワンタップで声を変換</h1>
        <p class="lead">録音した声をワンタップで加工して楽しめる iOS アプリです。</p>
      </section>

      <section class="section">
        <p>公開情報</p>
        <div class="links">
          <a class="link-card" href="privacy.html">
            <strong>プライバシーポリシー</strong>
            <span>データの取り扱いと第三者サービス利用について</span>
          </a>
          <a class="link-card" href="support.html">
            <strong>サポート</strong>
            <span>お問い合わせ窓口</span>
          </a>
        </div>
      </section>

      <p class="footer">© 2026 Kanekokei</p>
    </main>
  </body>
</html>
