<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanekokei Apps</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --line: #d8e0ec;
        --text: #101827;
        --sub: #465469;
        --muted: #758196;
        --accent: #3b4a63;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        line-height: 1.75;
        background: linear-gradient(180deg, #ffffff, var(--bg));
      }

      a {
        color: inherit;
      }

      .wrap {
        width: min(880px, calc(100% - 24px));
        margin: 24px auto 36px;
      }

      .hero,
      .section {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
        box-shadow: 0 12px 28px rgba(32, 46, 70, 0.08);
      }

      .hero {
        padding: 28px 22px;
      }

      .section {
        margin-top: 14px;
        padding: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 48px);
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: var(--sub);
      }

      .lead {
        margin-top: 10px;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .link-card {
        display: block;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        text-decoration: none;
        background: #f8fafd;
      }

      .link-card strong {
        display: block;
        color: var(--text);
      }

      .link-card span {
        color: var(--sub);
      }

      .footer {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>Kanekokei Apps</h1>
        <p class="lead">公開中のiOSアプリに関するサポート情報とプライバシーポリシーを掲載しています。</p>
      </section>

      <section class="section">
        <p>対応アプリ</p>
        <div class="links">
          <div class="link-card">
            <strong>じぶんガチャ</strong>
            <span>画像付きのオリジナルガチャを作成して楽しめるアプリ</span>
          </div>
          <div class="link-card">
            <strong>簡単ボイスチェンジャー：ワンタップで声を変換</strong>
            <span>録音した声を加工して楽しめるアプリ</span>
          </div>
        </div>
      </section>

      <section class="section">
        <p>公開情報</p>
        <div class="links">
          <a class="link-card" href="support.html">
            <strong>サポート</strong>
            <span>お問い合わせ窓口とよくある確認事項</span>
          </a>
          <a class="link-card" href="privacy.html">
            <strong>プライバシーポリシー</strong>
            <span>データの取り扱いと広告SDKについて</span>
          </a>
        </div>
      </section>

      <p class="footer">© 2026 Kanekokei</p>
    </main>
  </body>
</html>
